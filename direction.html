<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ディレクション 理解度テスト | SHO-SAN</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple: #534AB7; --purple-light: #EEEDFE; --purple-dark: #3C3489;
    --green-bg: #EAF3DE; --green-text: #27500A; --green-border: #639922;
    --red-bg: #FCEBEB; --red-text: #791F1F; --red-border: #A32D2D;
    --gray-100: #f5f5f5; --gray-200: #e8e8e8; --gray-400: #aaa;
    --gray-600: #666; --gray-900: #111; --white: #fff; --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  body { font-family: 'Noto Sans JP', sans-serif; background: #F4F2FF; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px 80px; }
  .container { width: 100%; max-width: 600px; }
  .header { text-align: center; margin-bottom: 32px; }
  .header .logo { display: inline-block; background: var(--purple); color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; padding: 4px 14px; border-radius: 20px; margin-bottom: 14px; }
  .header h1 { font-size: 22px; font-weight: 700; color: var(--gray-900); line-height: 1.4; }
  .header p { font-size: 13px; color: var(--gray-600); margin-top: 6px; }
  .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px 28px 24px; }
  .progress-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .progress-bar { flex: 1; height: 5px; background: var(--gray-200); border-radius: 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--purple); border-radius: 5px; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: var(--gray-400); white-space: nowrap; min-width: 40px; text-align: right; }
  .section-badge { display: inline-block; background: var(--purple-light); color: var(--purple-dark); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .question-text { font-size: 16px; font-weight: 500; color: var(--gray-900); line-height: 1.7; margin-bottom: 20px; }
  .choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .choice-btn { width: 100%; padding: 12px 16px; border: 1.5px solid var(--gray-200); border-radius: var(--radius); background: var(--white); color: var(--gray-900); font-size: 14px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; line-height: 1.5; }
  .choice-btn:hover:not(:disabled) { border-color: var(--purple); background: var(--purple-light); }
  .choice-btn.correct { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); font-weight: 500; }
  .choice-btn.wrong { border-color: var(--red-border); background: var(--red-bg); color: var(--red-text); }
  .choice-btn.dimmed { opacity: 0.45; }
  .choice-btn:disabled { cursor: default; }
  .feedback { font-size: 13px; line-height: 1.7; padding: 12px 14px; border-radius: 8px; margin-bottom: 16px; }
  .feedback.ok { background: var(--green-bg); color: var(--green-text); }
  .feedback.ng { background: var(--red-bg); color: var(--red-text); }
  .btn { display: inline-block; padding: 10px 24px; border-radius: var(--radius); font-size: 14px; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; cursor: pointer; border: 1.5px solid var(--gray-200); background: var(--white); color: var(--gray-900); transition: background 0.15s; }
  .btn:hover { background: var(--gray-100); }
  .btn.primary { background: var(--purple); color: var(--white); border-color: var(--purple); }
  .btn.primary:hover { background: var(--purple-dark); }
  .start-screen { text-align: center; padding: 16px 0 8px; }
  .start-screen .icon { font-size: 48px; margin-bottom: 16px; }
  .start-screen h2 { font-size: 18px; font-weight: 700; color: var(--gray-900); margin-bottom: 10px; }
  .start-screen p { font-size: 14px; color: var(--gray-600); line-height: 1.8; margin-bottom: 20px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; text-align: left; }
  .info-item { background: var(--gray-100); border-radius: 8px; padding: 12px 14px; }
  .info-item .label { font-size: 11px; color: var(--gray-400); margin-bottom: 2px; }
  .info-item .value { font-size: 15px; font-weight: 700; color: var(--gray-900); }
  .name-input-wrap { margin-bottom: 20px; text-align: left; }
  .name-input-wrap label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-600); margin-bottom: 6px; }
  .name-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius); font-size: 15px; font-family: 'Noto Sans JP', sans-serif; outline: none; transition: border-color 0.15s; }
  .name-input:focus { border-color: var(--purple); }
  .result-screen { text-align: center; padding: 8px 0; }
  .score-circle { width: 120px; height: 120px; border-radius: 50%; background: var(--purple-light); border: 4px solid var(--purple); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; }
  .score-num { font-size: 36px; font-weight: 700; color: var(--purple); line-height: 1; }
  .score-denom { font-size: 13px; color: var(--purple-dark); }
  .score-pct { font-size: 20px; font-weight: 700; color: var(--gray-900); margin-bottom: 6px; }
  .score-msg { font-size: 14px; color: var(--gray-600); line-height: 1.7; margin-bottom: 20px; }
  .saved-badge { display: inline-block; background: var(--green-bg); color: var(--green-text); font-size: 12px; padding: 4px 12px; border-radius: 20px; margin-bottom: 20px; }
  .fail-badge { display: inline-block; background: var(--red-bg); color: var(--red-text); font-size: 12px; padding: 4px 12px; border-radius: 20px; margin-bottom: 20px; }
  .review-title { font-size: 13px; font-weight: 700; color: var(--gray-600); letter-spacing: 0.05em; margin-bottom: 12px; text-align: left; }
  .review-item { padding: 12px 0; border-bottom: 1px solid var(--gray-200); text-align: left; }
  .review-item:last-child { border-bottom: none; }
  .review-q { font-size: 13px; color: var(--gray-900); line-height: 1.6; margin-bottom: 4px; }
  .review-a { font-size: 12px; color: var(--gray-600); line-height: 1.5; }
  .tag { display: inline-block; width: 20px; height: 20px; border-radius: 50%; font-size: 11px; font-weight: 700; text-align: center; line-height: 20px; margin-right: 6px; }
  .tag.ok { background: var(--green-bg); color: var(--green-text); }
  .tag.ng { background: var(--red-bg); color: var(--red-text); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">SHO-SAN</div>
    <h1>🎬 ディレクション<br>理解度テスト</h1>
    <p>ディレクションレクチャーの内容を確認しよう</p>
  </div>
  <div class="card" id="main-card"></div>
</div>

<script>
const SUPABASE_URL = 'https://zigtfxvdtjzlkqnhitrf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppZ3RmeHZkdGp6bGtxbmhpdHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNzY3MjcsImV4cCI6MjA5NDc1MjcyN30.QOmgD3vbYUjBqo3Qg6gcsFoyUjEZ0GVl_KTeP4Jn-4k';
const PASS_SCORE = 8; // 10問中8問以上で合格（80%）

const questions = [
  {
    section: 'ディレクションシート',
    q: 'ディレクションシートを使うとき、最初に必ずやることは何ですか？',
    choices: ['そのまま記入して使う', '必ずシートを複製してから使う', '上長に確認してから使う', 'テンプレを削除してから使う'],
    ans: 1,
    exp: 'ディレクションシートは⚠️必ず複製してから使います。元のテンプレートを直接編集してしまうと、他のメンバーが使えなくなります。'
  },
  {
    section: 'ディレクション内容',
    q: 'ディレクションに必ず含める必要がある項目として、正しいものはどれですか？',
    choices: [
      '投稿日・希望納期・ナレーション指示・テロップ指示・BGM指示・参考リール・素材共有',
      '投稿日・ナレーション指示・テロップ指示・BGM指示',
      '希望納期・テロップ指示・BGM指示・素材共有',
      '投稿日・ナレーション指示・素材共有・クライアント名'
    ],
    ans: 0,
    exp: 'ディレクション内容は「投稿日・希望納期・ナレーション指示・テロップ指示・BGM指示・参考リール（あれば）・素材共有」の7項目です。漏れなく伝えることで編集者がスムーズに作業できます。'
  },
  {
    section: 'ディレクションスケジュール',
    q: 'ディレクションは投稿日の何週間前までに行う必要がありますか？',
    choices: ['3日前まで', '1週間前まで', '2週間前まで', '1ヶ月前まで'],
    ans: 2,
    exp: 'ディレクションは投稿曜日から2週間前までに行い、編集者へ依頼します。余裕を持って依頼することで、修正対応の時間も確保できます。'
  },
  {
    section: 'ディレクションスケジュール',
    q: 'ディレクションは通常何週間分をまとめて行いますか？',
    choices: ['1週間分ずつ', '2週間分まとめて', '4週間分まとめて', 'その都度1本ずつ'],
    ans: 1,
    exp: 'ディレクションは2週間分をまとめて実施します。ただし月4本以下の投稿の場合は、1ヶ月分まとめてディレクションします。'
  },
  {
    section: 'ディレクションスケジュール',
    q: '月に4本以下しか投稿しないアカウントのディレクションは、何週間分まとめて行いますか？',
    choices: ['2週間分', '3週間分', '4週間分（1ヶ月分）', '毎週1本ずつ'],
    ans: 2,
    exp: '月4本以下の投稿の場合は、例外として1ヶ月分まとめてディレクションを実施します。通常の2週間分ルールとの違いをしっかり押さえておきましょう。'
  },
  {
    section: '外注社への対応',
    q: 'ディレクションで外注の編集者に連絡するとき、正しい書き出しはどれですか？',
    choices: ['「お疲れ様です」', '「よろしくお願いします」', '「お世話になっております」', '「こんにちは」'],
    ans: 2,
    exp: '外注社（社外の編集者）への連絡は「お世話になっております」が正しい書き出しです。「お疲れ様です」は社内向けの表現のため、社外には使いません。ビジネスマナーとして必ず守りましょう。'
  },
  {
    section: '外注社への対応',
    q: 'ディレクションで依頼する編集者は誰ですか？',
    choices: ['SHO-SAN社内のメンバー', '外注（社外）の編集者', 'クライアント自身', 'フリーランスのデザイナー'],
    ans: 1,
    exp: 'ディレクションする際の編集者はSHO-SAN社内ではなく、外注（社外）の編集者です。そのため「お疲れ様です」ではなく「お世話になっております」を使う必要があります。'
  },
  {
    section: 'テロップ共通ルール',
    q: 'テロップの共通ルールとして正しいフォントと色の指定はどれですか？',
    choices: [
      'ゴシック体・黒文字',
      '明朝体・白文字',
      '影付き丸ゴシック・白文字',
      'メイリオ・グレー文字'
    ],
    ans: 2,
    exp: 'テロップの共通ルールは「影付き丸ゴシック・白文字」です。また、テロップは横入れにすることもルールとして定められています。統一感のある動画仕上がりのために必ず守りましょう。'
  },
  {
    section: 'テロップ共通ルール',
    q: 'テロップの入れ方について、共通ルールとして正しいのはどれですか？',
    choices: ['縦入れ（縦書き）にする', '横入れ（横書き）にする', 'テロップは入れない', '編集者の判断に任せる'],
    ans: 1,
    exp: 'テロップは横入れ（横書き）にすることが共通ルールです。また間延びしそうな部分は早送りして緩急をつけることも指示に含めましょう。'
  },
  {
    section: 'ディレクション全般',
    q: 'ディレクションシートを作成したあと、次にやるべきことはどれですか？',
    choices: [
      'クライアントに直接送る',
      '所定の管理場所にスプレッドシートのURLを貼って共有する',
      '自分のドライブだけに保存する',
      '印刷してファイリングする'
    ],
    ans: 1,
    exp: '作成したディレクションシートは所定の管理場所（Notionの表）にURLを貼って共有します。チーム全体で進捗を把握するために、作成後は必ず貼り付けましょう。'
  }
];

let current = 0, score = 0, log = [], userName = '';
const card = document.getElementById('main-card');

function renderStart() {
  card.innerHTML = `
    <div class="start-screen">
      <div class="icon">🎬</div>
      <h2>テストを始める前に</h2>
      <p>ディレクションレクチャーの内容をどれだけ理解できているか確認しましょう。<br>全${questions.length}問・4択・8問以上で合格です。</p>
      <div class="info-grid">
        <div class="info-item"><div class="label">問題数</div><div class="value">${questions.length}問</div></div>
        <div class="info-item"><div class="label">形式</div><div class="value">4択</div></div>
        <div class="info-item"><div class="label">制限時間</div><div class="value">なし</div></div>
        <div class="info-item"><div class="label">合格ライン</div><div class="value">8問以上</div></div>
      </div>
      <div class="name-input-wrap">
        <label>あなたの名前を入力してください</label>
        <input class="name-input" id="nameInput" type="text" placeholder="例：山田 太郎" maxlength="30">
      </div>
      <button class="btn primary" onclick="startQuiz()">テスト開始 →</button>
    </div>`;
}

function startQuiz() {
  const raw = document.getElementById('nameInput').value;
  const trimmed = raw.replace(/[\s\u3000]+/g, '');
  if (!trimmed) { alert('名前を入力してください'); return; }
  userName = raw.trim().replace(/\s+/g, ' ');
  renderQuiz();
}

function renderQuiz() {
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);
  card.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${current + 1} / ${questions.length}</div>
    </div>
    <div class="section-badge">${q.section}</div>
    <div class="question-text">${q.q}</div>
    <div class="choices">
      ${q.choices.map((c, i) => `<button class="choice-btn" id="c${i}" onclick="pick(${i})">${c}</button>`).join('')}
    </div>
    <div id="feedback"></div>
    <div id="nav"></div>`;
}

function pick(i) {
  const q = questions[current];
  const correct = i === q.ans;
  if (correct) score++;
  log.push({ q: q.q, correct, yourAns: q.choices[i], rightAns: q.choices[q.ans] });
  for (let j = 0; j < q.choices.length; j++) {
    const btn = document.getElementById('c' + j);
    btn.disabled = true;
    if (j === q.ans) btn.classList.add('correct');
    else if (j === i) btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  }
  document.getElementById('feedback').innerHTML =
    `<div class="feedback ${correct ? 'ok' : 'ng'}">${correct ? '✓ 正解！' : '✗ 不正解。'} ${q.exp}</div>`;
  document.getElementById('nav').innerHTML = current < questions.length - 1
    ? `<button class="btn primary" onclick="nextQ()">次の問題 →</button>`
    : `<button class="btn primary" onclick="finishQuiz()">結果を見る →</button>`;
}

function nextQ() { current++; renderQuiz(); }

async function finishQuiz() {
  await saveResult();
  renderResult();
}

async function saveResult() {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/quiz_results`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({
        name: userName,
        score,
        total: questions.length,
        quiz_type: 'direction',
        chapter: null,
        chapter_scores: null
      })
    });
  } catch(e) { console.error(e); }
}

function renderResult() {
  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= PASS_SCORE;
  const msg = pct === 100 ? '満点！ディレクションを完璧に理解しています👏'
    : pct >= 80 ? '合格！ディレクションの基本をしっかり理解できています。'
    : pct >= 60 ? 'もう少し！レクチャー資料をもう一度確認して再挑戦してみましょう。'
    : 'ディレクションレクチャーをしっかり読み直してから再挑戦しましょう！';

  const reviewHTML = log.map((item, i) => `
    <div class="review-item">
      <div class="review-q"><span class="tag ${item.correct ? 'ok' : 'ng'}">${item.correct ? '○' : '✗'}</span>Q${i + 1}：${item.q}</div>
      ${!item.correct ? `<div class="review-a" style="padding-left:26px">あなたの回答：${item.yourAns}<br>正解：<strong>${item.rightAns}</strong></div>` : ''}
    </div>`).join('');

  card.innerHTML = `
    <div class="result-screen">
      <div class="score-circle">
        <div class="score-num">${score}</div>
        <div class="score-denom">/ ${questions.length}</div>
      </div>
      <div class="score-pct">${pct}%</div>
      <div class="score-msg">${msg}</div>
      ${passed
        ? `<div class="saved-badge">✓ 合格！結果を保存しました</div>`
        : `<div class="fail-badge">✗ 不合格（合格ライン：8問以上）</div>`
      }
      <br>
      ${!passed ? `<button class="btn" onclick="restart()" style="margin-bottom:24px">もう一度挑戦する</button>` : ''}
      <div class="review-title">回答の振り返り</div>
      ${reviewHTML}
    </div>`;
}

function restart() { current = 0; score = 0; log = []; userName = ''; renderStart(); }
renderStart();
</script>
</body>
</html>
