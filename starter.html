<style>

  body { font-family: 'Noto Sans JP', sans-serif; background: #F4F2FF; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px 80px; }

  .header { text-align: center; margin-bottom: 32px; }

  .header p { font-size: 13px; color: var(--gray-600); margin-top: 6px; }
  .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px 28px 24px; }
  .progress-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .progress-bar { flex: 1; height: 5px; background: var(--gray-200); border-radius: 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--purple); border-radius: 5px; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: var(--gray-400); white-space: nowrap; min-width: 40px; text-align: right; }
  .chapter-label { font-size: 11px; color: var(--purple); font-weight: 700; margin-bottom: 16px; }
  .section-badge { display: inline-block; background: var(--purple-light); color: var(--purple-dark); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .question-text { font-size: 16px; font-weight: 500; color: var(--gray-900); line-height: 1.7; margin-bottom: 20px; }
  .choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .choice-btn { width: 100%; padding: 12px 16px; border: 1.5px solid var(--gray-200); border-radius: var(--radius); background: var(--white); color: var(--gray-900); font-size: 14px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; line-height: 1.5; }
  .choice-btn:hover:not(:disabled) { border-color: var(--purple); background: var(--purple-light); }
  .choice-btn.correct { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); font-weight: 500; }
  .choice-btn.wrong { border-color: var(--red-border); background: var(--red-bg); color: var(--red-text); }
  .choice-btn.dimmed { opacity: 0.45; }
  .choice-btn:disabled { cursor: default; }
  .feedback { font-size: 13px; line-height: 1.7; padding: 12px 14px; border-radius: 8px; margin-bottom: 16px; }
  .feedback.ok { background: var(--green-bg); color: var(--green-text); }
  .feedback.ng { background: var(--red-bg); color: var(--red-text); }
  .btn { display: inline-block; padding: 10px 24px; border-radius: var(--radius); font-size: 14px; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; cursor: pointer; border: 1.5px solid var(--gray-200); background: var(--white); color: var(--gray-900); transition: background 0.15s; }

  .btn.primary { background: var(--purple); color: var(--white); border-color: var(--purple); }

  .name-input-wrap { margin-bottom: 20px; text-align: left; }
  .name-input-wrap label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-600); margin-bottom: 6px; }
  .name-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius); font-size: 15px; font-family: 'Noto Sans JP', sans-serif; outline: none; transition: border-color 0.15s; }

  /* チャプター選択 */
  .chapter-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .chapter-item { display: flex; align-items: center; padding: 14px 16px; border: 1.5px solid var(--gray-200); border-radius: var(--radius); cursor: pointer; transition: all 0.15s; background: var(--white); }
  .chapter-item:hover { border-color: var(--purple); background: var(--purple-light); }
  .chapter-item.locked { opacity: 0.5; cursor: not-allowed; }
  .chapter-item.locked:hover { border-color: var(--gray-200); background: var(--white); }
  .chapter-item.passed { border-color: var(--green-border); background: var(--green-bg); }
  .ch-icon { font-size: 24px; margin-right: 14px; flex-shrink: 0; }
  .ch-info { flex: 1; text-align: left; }
  .ch-title { font-size: 14px; font-weight: 700; color: var(--gray-900); margin-bottom: 2px; }
  .ch-sub { font-size: 12px; color: var(--gray-600); }
  .ch-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }
  .ch-badge.pass { background: var(--green-bg); color: var(--green-text); }
  .ch-badge.open { background: var(--purple-light); color: var(--purple-dark); }
  .ch-badge.lock { background: var(--gray-100); color: var(--gray-400); }

  .score-circle { width: 120px; height: 120px; border-radius: 50%; background: var(--purple-light); border: 4px solid var(--purple); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; }
  .score-num { font-size: 36px; font-weight: 700; color: var(--purple); line-height: 1; }
  .score-denom { font-size: 13px; color: var(--purple-dark); }
  .score-pct { font-size: 20px; font-weight: 700; color: var(--gray-900); margin-bottom: 6px; }
  .score-msg { font-size: 14px; color: var(--gray-600); line-height: 1.7; margin-bottom: 20px; }
  .saved-badge { display: inline-block; background: var(--green-bg); color: var(--green-text); font-size: 12px; padding: 4px 12px; border-radius: 20px; margin-bottom: 20px; }
  .fail-badge { display: inline-block; background: var(--red-bg); color: var(--red-text); font-size: 12px; padding: 4px 12px; border-radius: 20px; margin-bottom: 20px; }
  .review-title { font-size: 13px; font-weight: 700; color: var(--gray-600); letter-spacing: 0.05em; margin-bottom: 12px; text-align: left; }
  .review-item { padding: 12px 0; border-bottom: 1px solid var(--gray-200); text-align: left; }
  .review-item:last-child { border-bottom: none; }
  .review-q { font-size: 13px; color: var(--gray-900); line-height: 1.6; margin-bottom: 4px; }
  .review-a { font-size: 12px; color: var(--gray-600); line-height: 1.5; }
  .tag { display: inline-block; width: 20px; height: 20px; border-radius: 50%; font-size: 11px; font-weight: 700; text-align: center; line-height: 20px; margin-right: 6px; }
  .tag.ok { background: var(--green-bg); color: var(--green-text); }
  .tag.ng { background: var(--red-bg); color: var(--red-text); }

  /* 全チャプタークリア */
  .complete-screen { text-align: center; padding: 16px 0; }
  .complete-screen .big-icon { font-size: 64px; margin-bottom: 16px; }
  .complete-screen h2 { font-size: 20px; font-weight: 700; margin-bottom: 10px; color: var(--gray-900); }

  .total-score-bar { background: var(--purple-light); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; text-align: left; }
  .total-score-bar .label { font-size: 11px; color: var(--gray-600); margin-bottom: 4px; }
  .total-score-bar .value { font-size: 22px; font-weight: 700; color: var(--purple); }
</style>
</head>

    questions: [

      { section:'工務店集客', q:'工務店の集客においてInstagramが重要な理由として最も正しいのはどれですか？', choices:['Instagramは無料で使えるから','家づくりを検討するユーザーが施工事例・雰囲気をビジュアルで確認できるから','他のSNSより広告費が安いから','若者にしかリーチできないから'], ans:1, exp:'工務店集客でInstagramが重要なのは、家づくりを検討するユーザーが施工事例・雰囲気をビジュアルで確認できるため。ユーザーとコミュニケーションをとれる機能も充実しています。' },

      { section:'ペルソナ分析', q:'ペルソナを設定する際、特に重要な情報として正しいのはどれですか？', choices:['ペルソナの年収と職業のみ','年齢・家族構成・ライフスタイル・住まいに対する価値観など具体的な人物像','フォロワー数と投稿頻度','競合他社の情報'], ans:1, exp:'ペルソナ設定では年齢・家族構成・ライフスタイル・価値観など具体的な人物像を描くことが重要です。「この人はどんな投稿を見たいか？」という視点が生まれます。' },

      { section:'成果創出', q:'SHO-SANがクライアントに提供する「成果」の定義として正しいのはどれですか？', choices:['フォロワー1万人達成','毎日の投稿継続','バズった投稿の制作','Instagram運用を通じた来場予約・成約（家の契約）への貢献'], ans:3, exp:'SHO-SANの成果とは「成約＝家を建てる契約」に繋げることです。フォロワー数や投稿数ではなく、クライアントのビジネスに直接貢献できるかどうかが評価基準です。' }

let userName = '';
let currentChapterIdx = 0;
let currentQIdx = 0;
let chapterScore = 0;
let chapterLog = [];
let passedChapters = {};
let chapterScoreRecord = {};
let totalAnswered = 0;
let totalCorrect = 0;

const card = document.getElementById('main-card');

function renderStart() {
  card.innerHTML = `
    <div class="start-screen">
      <div class="icon">📗</div>
      <h2>テストを始める前に</h2>
      <p>スターター編のLearning BOXを読んだ後、<br>各チャプターのテストに合格しよう！<br>全4チャプター・各7問・6問以上（80%）で合格です。</p>
      <div class="name-input-wrap">
        <label>あなたの名前を入力してください</label>
        <input class="name-input" id="nameInput" type="text" placeholder="例：山田 太郎" maxlength="30">
      </div>
      <button class="btn primary" onclick="startApp()">はじめる →</button>
    </div>`;
}

function startApp() {
  const raw = document.getElementById('nameInput').value;
  const trimmed = raw.replace(/[\s\u3000]+/g, ''); // 全角・半角スペース除去
  if (!trimmed) { alert('名前を入力してください'); return; }
  userName = raw.trim().replace(/\s+/g, ' '); // 前後trim、中間スペースは1つに
  if (!userName) { alert('名前を入力してください'); return; }
  renderChapterSelect();
}

function renderChapterSelect() {
  const allPassed = chapters.every(c => passedChapters[c.id]);
  if (allPassed) { renderAllComplete(); return; }

  const items = chapters.map((ch, i) => {
    const passed = passedChapters[ch.id];
    const locked = i > 0 && !passedChapters[chapters[i-1].id];
    let badgeHtml = '';
    let cls = '';
    if (passed) { badgeHtml = `<span class="ch-badge pass">✓ 合格</span>`; cls = 'passed'; }
    else if (locked) { badgeHtml = `<span class="ch-badge lock">🔒 前のChを先に</span>`; cls = 'locked'; }
    else { badgeHtml = `<span class="ch-badge open">受験する</span>`; }
    const onclick = (!passed && !locked) ? `onclick="startChapter(${i})"` : '';
    return `<div class="chapter-item ${cls}" ${onclick}>
      <div class="ch-icon">${ch.icon}</div>
      <div class="ch-info">
        <div class="ch-title">${ch.title}</div>
        <div class="ch-sub">${ch.sub}</div>
      </div>
      ${badgeHtml}
    </div>`;
  }).join('');

  card.innerHTML = `
    <p style="font-size:14px;color:var(--gray-600);margin-bottom:16px;">こんにちは、<strong>${userName}</strong>さん！<br>受験するチャプターを選んでください。</p>
    <div class="chapter-list">${items}</div>
  `;
}

function startChapter(idx) {
  currentChapterIdx = idx;
  currentQIdx = 0;
  chapterScore = 0;
  chapterLog = [];
  renderQuestion();
}

function renderQuestion() {
  const ch = chapters[currentChapterIdx];
  const q = ch.questions[currentQIdx];
  const total = ch.questions.length;
  const pct = Math.round((currentQIdx / total) * 100);

  card.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${currentQIdx + 1} / ${total}</div>
    </div>
    <div class="chapter-label">${ch.icon} ${ch.title}</div>
    <div class="section-badge">${q.section}</div>
    <div class="question-text">${q.q}</div>
    <div class="choices">
      ${q.choices.map((c, i) => `<button class="choice-btn" id="c${i}" onclick="pick(${i})">${c}</button>`).join('')}
    </div>
    <div id="feedback"></div>
    <div id="nav"></div>`;
}

function pick(i) {
  const ch = chapters[currentChapterIdx];
  const q = ch.questions[currentQIdx];
  const correct = i === q.ans;
  if (correct) chapterScore++;
  chapterLog.push({ q: q.q, correct, yourAns: q.choices[i], rightAns: q.choices[q.ans] });

  for (let j = 0; j < q.choices.length; j++) {
    const btn = document.getElementById('c' + j);
    btn.disabled = true;
    if (j === q.ans) btn.classList.add('correct');
    else if (j === i) btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  }

  document.getElementById('feedback').innerHTML =
    `<div class="feedback ${correct?'ok':'ng'}">${correct?'✓ 正解！':'✗ 不正解。'} ${q.exp}</div>`;

  const isLast = currentQIdx >= ch.questions.length - 1;
  document.getElementById('nav').innerHTML = isLast
    ? `<button class="btn primary" onclick="finishChapter()">結果を見る →</button>`
    : `<button class="btn primary" onclick="nextQ()">次の問題 →</button>`;
}

function nextQ() { currentQIdx++; renderQuestion(); }

async function finishChapter() {
  const ch = chapters[currentChapterIdx];
  const passed = chapterScore >= PASS_SCORE;
  if (passed) passedChapters[ch.id] = true;
  chapterScoreRecord[ch.id] = chapterScore;
  totalAnswered += ch.questions.length;
  totalCorrect += chapterScore;

  // Supabaseに保存
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/quiz_results`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({
        name: userName,
        score: chapterScore,
        total: ch.questions.length,
        quiz_type: 'starter',
        chapter: ch.id,
        chapter_scores: { [ch.id]: chapterScore }
      })
    });
  } catch(e) { console.error(e); }

  renderChapterResult(passed);
}

function renderChapterResult(passed) {
  const ch = chapters[currentChapterIdx];
  const total = ch.questions.length;
  const pct = Math.round((chapterScore / total) * 100);

  const reviewHTML = chapterLog.map((item, i) => `
    <div class="review-item">
      <div class="review-q"><span class="tag ${item.correct?'ok':'ng'}">${item.correct?'○':'✗'}</span>Q${i+1}：${item.q}</div>
      ${!item.correct?`<div class="review-a" style="padding-left:26px">あなたの回答：${item.yourAns}<br>正解：<strong>${item.rightAns}</strong></div>`:''}
    </div>`).join('');

  const msg = passed
    ? pct===100?'満点！完璧な理解です👏':'合格！よく理解できています。'
    : 'もう少し！もう一度チャレンジしてみましょう。';

  card.innerHTML = `
    <div class="result-screen">
      <div class="score-circle">
        <div class="score-num">${chapterScore}</div>
        <div class="score-denom">/ ${total}</div>
      </div>
      <div class="score-pct">${pct}%</div>
      <div class="score-msg">${msg}</div>
      ${passed
        ? `<div class="saved-badge">✓ ${ch.title} 合格！</div>`
        : `<div class="fail-badge">✗ 不合格（合格ライン：${PASS_SCORE}問以上）</div>`
      }
      <br>
      ${passed
        ? `<button class="btn primary" onclick="renderChapterSelect()" style="margin-bottom:24px">次のチャプターへ →</button>`
        : `<button class="btn primary" onclick="startChapter(${currentChapterIdx})" style="margin-bottom:24px">もう一度挑戦する</button>`
      }
      <div class="review-title">回答の振り返り</div>
      ${reviewHTML}
      <br>
      <button class="btn" onclick="renderChapterSelect()">チャプター選択に戻る</button>
    </div>`;
}

function renderAllComplete() {
  const totalQ = chapters.reduce((s,c) => s+c.questions.length, 0);
  card.innerHTML = `
    <div class="complete-screen">
      <div class="big-icon">🎉</div>
      <h2>スターター編コンプリート！</h2>
      <p>全4チャプターを合格しました。<br>Instagram運用の基礎知識はバッチリです！<br>これからの実務でしっかり活かしていきましょう。</p>
      <div class="total-score-bar">
        <div class="label">総合成績</div>
        <div class="value">${chapters.map(c=>`${c.icon} ${c.id.toUpperCase()}：${chapterScoreRecord[c.id]||'?'}/${c.questions.length}`).join('　')}</div>
      </div>
      <button class="btn primary" onclick="resetAll()">最初からやり直す</button>
    </div>`;
}

function resetAll() {
  passedChapters = {};
  chapterScoreRecord = {};
  totalAnswered = 0;
  totalCorrect = 0;
  renderStart();
}

renderStart();
</script>
</body>
</html>
